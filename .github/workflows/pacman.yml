name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Gera o Pacman clássico real (com fantasmas e boca)
      - name: Generate Pacman Graph
        uses: jasonlong/github-contribution-calendar-to-pacman@master
        with:
          github_user_name: ${{ github.repository_owner }}
          output_svg: dist/pacman-contribution-graph.svg

      # Sobe o arquivo gerado para a branch output
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Garante o checkout do repositório para evitar o erro 128 de falta de contexto do Git
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Gera a animação do Pacman
      - name: Generate Pacman Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github-dark&color_snake=#f3f315&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            
      # Faz o deploy preservando o que a Snake já colocou lá
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

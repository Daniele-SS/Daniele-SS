name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Esta versão corrigida gera o Pacman real (com boca e fantasmas)
      - name: Generate Pacman Real Animation
        uses: lowlighter/metrics@master
        with:
          filename: dist/pacman-contribution-graph.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_sections: duration
          # Injeta o estilo do Pacman clássico
          config_tweaks: |
            .isocalendar { background: transparent; }
